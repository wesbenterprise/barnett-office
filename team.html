<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Party — Office Barnett</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a18;
            font-family: 'VT323', monospace;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated starfield */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(1px 1px at 20px 30px, #fff, transparent),
                radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 50px 160px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 160px 120px, #fff, transparent),
                radial-gradient(1px 1px at 200px 50px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 220px 140px, #fff, transparent),
                radial-gradient(1px 1px at 260px 90px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 300px 60px, #fff, transparent);
            background-size: 320px 200px;
            animation: twinkle 4s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes twinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* CRT scan lines */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 100;
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: #f0e68c;
            text-shadow: 
                3px 3px 0 #8b4513,
                0 0 20px rgba(240, 230, 140, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            color: #888;
            margin-top: 10px;
            letter-spacing: 4px;
        }

        /* Party container - FF6 style blue menu */
        .party-container {
            background: linear-gradient(180deg, #1a1a4a 0%, #0a0a2a 100%);
            border: 4px solid #4a4a8a;
            border-radius: 0;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            box-shadow: 
                inset 2px 2px 0 #6a6aaa,
                inset -2px -2px 0 #2a2a5a,
                0 0 40px rgba(100, 100, 200, 0.3);
            position: relative;
        }

        /* Corner decorations like FF menus */
        .party-container::before {
            content: '◆';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            color: #4a4a8a;
            font-size: 1.2rem;
        }

        /* Character rows */
        .character {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 20px;
            align-items: center;
            padding: 15px;
            border-bottom: 2px solid #2a2a5a;
            transition: all 0.2s ease;
        }

        .character:last-child {
            border-bottom: none;
        }

        .character:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .character:hover .portrait {
            box-shadow: 
                0 0 0 3px #f0e68c,
                0 0 20px rgba(240, 230, 140, 0.5);
        }

        /* Pixel art portrait frame */
        .portrait {
            width: 64px;
            height: 64px;
            background: #1a1a3a;
            border: 3px solid #6a6aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 
                inset 2px 2px 0 #8a8aca,
                inset -2px -2px 0 #3a3a6a;
            transition: all 0.2s ease;
            image-rendering: pixelated;
        }

        /* Character info */
        .char-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .char-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
        }

        .char-class {
            font-family: 'VT323', monospace;
            font-size: 1.3rem;
            color: #8888ff;
            letter-spacing: 2px;
        }

        /* Stats section */
        .stats {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 140px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            color: #f0e68c;
            width: 25px;
        }

        .stat-bar-container {
            flex: 1;
            height: 8px;
            background: #1a1a3a;
            border: 1px solid #4a4a8a;
            position: relative;
        }

        .stat-bar {
            height: 100%;
            transition: width 1s ease;
        }

        .stat-bar.hp {
            background: linear-gradient(180deg, #00ff00 0%, #008800 100%);
            box-shadow: 0 0 5px #00ff00;
        }

        .stat-bar.mp {
            background: linear-gradient(180deg, #00ffff 0%, #0088aa 100%);
            box-shadow: 0 0 5px #00ffff;
        }

        .stat-value {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            color: #fff;
            width: 45px;
            text-align: right;
        }

        /* Footer / navigation */
        .footer {
            margin-top: 40px;
            text-align: center;
        }

        .back-link {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            color: #888;
            text-decoration: none;
            padding: 10px 20px;
            border: 2px solid #444;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .back-link:hover {
            color: #f0e68c;
            border-color: #f0e68c;
            box-shadow: 0 0 15px rgba(240, 230, 140, 0.3);
        }

        .menu-hint {
            font-family: 'VT323', monospace;
            font-size: 1rem;
            color: #444;
            margin-top: 20px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Selection cursor */
        .cursor {
            color: #f0e68c;
            margin-right: 10px;
            animation: cursorBounce 0.5s ease-in-out infinite alternate;
            display: none;
        }

        .character:hover .cursor {
            display: inline;
        }

        @keyframes cursorBounce {
            0% { transform: translateX(0); }
            100% { transform: translateX(5px); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .character {
                grid-template-columns: 64px 1fr;
                gap: 15px;
            }
            .stats {
                grid-column: span 2;
                margin-top: 10px;
            }
            .title {
                font-size: 1rem;
            }
            .char-name {
                font-size: 0.8rem;
            }
        }

        /* Decorative crystals */
        .crystal {
            position: fixed;
            font-size: 2rem;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            z-index: 1;
        }
        .crystal-1 { top: 10%; left: 5%; animation-delay: 0s; }
        .crystal-2 { top: 30%; right: 8%; animation-delay: 1s; }
        .crystal-3 { bottom: 20%; left: 10%; animation-delay: 2s; }
        .crystal-4 { bottom: 30%; right: 5%; animation-delay: 3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="scanlines"></div>
    
    <div class="crystal crystal-1">💎</div>
    <div class="crystal crystal-2">✨</div>
    <div class="crystal crystal-3">💎</div>
    <div class="crystal crystal-4">✨</div>

    <div class="container">
        <div class="header">
            <h1 class="title">— THE PARTY —</h1>
            <div class="subtitle">[ SELECT MEMBER ]</div>
        </div>

        <div class="party-container">
            <div class="character">
                <div class="portrait">⚔️</div>
                <div class="char-info">
                    <div class="char-name"><span class="cursor">▶</span>WESLEY</div>
                    <div class="char-class">Son</div>
                </div>
                <div class="stats">
                    <div class="stat-row">
                        <span class="stat-label">HP</span>
                        <div class="stat-bar-container">
                            <div class="stat-bar hp" style="width: 95%"></div>
                        </div>
                        <span class="stat-value">9999</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">MP</span>
                        <div class="stat-bar-container">
                            <div class="stat-bar mp" style="width: 80%"></div>
                        </div>
                        <span class="stat-value">420</span>
                    </div>
                </div>
            </div>

            <div class="character">
                <div class="portrait">🗡️</div>
                <div class="char-info">
                    <div class="char-name"><span class="cursor">▶</span>NICHOLAS</div>
                    <div class="char-class">Son</div>
                </div>
                <div class="stats">
                    <div class="stat-row">
                        <span class="stat-label">HP</span>
                        <div class="stat-bar-container">
                            <div class="stat-bar hp" style="width: 90%"></div>
                        </div>
                        <span class="stat-value">8888</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">MP</span>
                        <div class="stat-bar-container">
                            <div class="stat-bar mp" style="width: 75%"></div>
                        </div>
                        <span class="stat-value">350</span>
                    </div>
                </div>
            </div>

            <div class="character">
                <div class="portrait">🌑</div>
                <div class="char-info">
                    <div class="char-name"><span class="cursor">▶</span>DAVID</div>
                    <div class="char-class">Dark Knight</div>
                </div>
                <div class="stats">
                    <div class="stat-row">
                        <span class="stat-label">HP</span>
                        <div class="stat-bar-container">
                            <div class="stat-bar hp" style="width: 100%"></div>
                        </div>
                        <span class="stat-value">9999</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">MP</span>
                        <div class="stat-bar-container">
                            <div class="stat-bar mp" style="width: 40%"></div>
                        </div>
                        <span class="stat-value">150</span>
                    </div>
                </div>
            </div>

            <div class="character">
                <div class="portrait">✝️</div>
                <div class="char-info">
                    <div class="char-name"><span class="cursor">▶</span>CHAD</div>
                    <div class="char-class">Cleric</div>
                </div>
                <div class="stats">
                    <div class="stat-row">
                        <span class="stat-label">HP</span>
                        <div class="stat-bar-container">
                            <div class="stat-bar hp" style="width: 70%"></div>
                        </div>
                        <span class="stat-value">6500</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">MP</span>
                        <div class="stat-bar-container">
                            <div class="stat-bar mp" style="width: 100%"></div>
                        </div>
                        <span class="stat-value">999</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="index.html" class="back-link">← RETURN</a>
            <div class="menu-hint">▼ PRESS START ▼</div>
        </div>
    </div>
</body>
</html>
